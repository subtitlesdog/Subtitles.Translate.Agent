name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Restore
        run: dotnet restore src/Subtitles.Translate.Agent.slnx

      - name: Publish
        run: dotnet publish src/Subtitles.Translate.Agent/Subtitles.Translate.Agent.csproj -c Release -r ${{ matrix.rid }} --self-contained true -o dist/${{ matrix.rid }} /p:PublishSingleFile=true

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $rid = "${{ matrix.rid }}"
          $zip = "dist/Subtitles.Translate.Agent-$tag-$rid.zip"
          Compress-Archive -Path "dist/$rid/*" -DestinationPath $zip -Force

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          rid="${{ matrix.rid }}"
          cd "dist/${rid}"
          zip -r "../Subtitles.Translate.Agent-${tag}-${rid}.zip" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: create release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
